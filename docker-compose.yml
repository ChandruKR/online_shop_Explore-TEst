version: '3.8'

services:
  vite-app:
    container_name: Online-SHopping-App
    image:  onlineshop # Replace with your built image name
    build:
      context: .  # Uses the Dockerfile in the current directory
    ports:
      - "3000:3000"  # Maps container port 3000 to host port 3000
    restart: always  # Restart the container if it crashes
